name: Actualizar datos diario

on:
  schedule:
    - cron: '0 12 * * *'  # 8am hora RD (UTC-4)
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear archivo .env
        run: |
          echo "YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}" >> .env
          echo "YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}" >> .env
          echo "YAHOO_CONSUMER_KEY=${{ secrets.YAHOO_CONSUMER_KEY }}" >> .env
          echo "YAHOO_CONSUMER_SECRET=${{ secrets.YAHOO_CONSUMER_SECRET }}" >> .env
          echo "YAHOO_ACCESS_TOKEN=${{ secrets.YAHOO_ACCESS_TOKEN }}" >> .env
          echo "YAHOO_REFRESH_TOKEN=${{ secrets.YAHOO_REFRESH_TOKEN }}" >> .env
          echo "YAHOO_TOKEN_TIME=${{ secrets.YAHOO_TOKEN_TIME }}" >> .env
          echo "YAHOO_TOKEN_TYPE=${{ secrets.YAHOO_TOKEN_TYPE }}" >> .env
          echo "YAHOO_GUID=${{ secrets.YAHOO_GUID }}" >> .env

      - name: Actualizar roster
        run: python src/yahoo_api.py

      - name: Actualizar odds liga
        run: python src/liga_odds.py

      - name: Actualizar waivers
        run: python src/waivers.py

      - name: Actualizar proyecciones semanales
        run: python src/modelo_avanzado.py

      - name: Actualizar matchup semanal
        run: python src/matchup.py

      - name: Actualizar historial matchups
        run: python src/historial.py

      - name: Actualizar streaks
        run: python src/streaks.py

      - name: Analizar trades
        run: python src/trades.py

      - name: Actualizar offense por equipo
        run: python src/team_offense.py

      - name: Analizar schedule SP
        run: python src/schedule.py

      - name: Matchup pitcher vs equipo
        run: python src/matchup_pitcher_equipo.py

      - name: Modelo favorabilidad
        run: python src/modelo_favorabilidad.py

      - name: Alertas de explosion
        run: python src/alertas_explosion.py

      - name: Identificar closers
        run: python src/closers.py

      
      - name: Commit datos actualizados
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "auto: actualizar datos $(date +'%Y-%m-%d')"
          git push